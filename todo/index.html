<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo 체크리스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-icon">✦</div>
      <h1>My <span>Todo</span></h1>
    </div>
    <p class="stats" id="stats">0개 중 0개 완료</p>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." />
      <button onclick="addTodo()">+ 추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="todoList"></ul>

    <div class="empty" id="emptyMsg" style="display:none;">
      <span class="empty-icon">🌟</span>
      할 일이 없습니다.
    </div>

    <button class="clear-btn" onclick="clearDone()">완료된 항목 삭제</button>

  </div>
  <script src="app.js"></script>
</body>
</html>
